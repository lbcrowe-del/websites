name: Deploy Licensing API

on:
  push:
    branches:
      - main
    paths:
      - 'server-bridge/api/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet publish server-bridge/api/ServerBridge.LicensingApi.csproj --configuration Release --output ./publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Keep the Function App's runtime stack in lockstep with the package's target framework.
      # Setting it here, before the publish below, means the package swap (which restarts the
      # app) lands on the already-correct stack instead of a mismatched one.
      - name: Ensure .NET 10 isolated runtime stack
        run: |
          az functionapp config set \
            --name serverbridge-licensing \
            --resource-group websites_rg \
            --net-framework-version v10.0

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: serverbridge-licensing
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE }}
