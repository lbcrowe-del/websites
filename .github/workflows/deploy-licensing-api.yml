name: Deploy Licensing API

on:
  push:
    branches:
      - main
    paths:
      - 'server-bridge/api/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet publish server-bridge/api/ServerBridge.LicensingApi.csproj --configuration Release --output ./publish --runtime linux-x64 --self-contained false

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: serverbridge-licensing
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE }}
