<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Get ServerBridge</title>
  <meta name="description" content="Choose your country to continue to checkout for ServerBridge." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="wrap topbar">
    <div class="brand"><span class="mark">S</span> ServerBridge</div>
    <a class="home" href="index.html">&larr; Back</a>
  </header>

  <main>
    <section class="wrap buy">
      <div class="card buy-card">
        <div class="section-head" style="margin-bottom:20px">
          <h2>Get ServerBridge</h2>
          <p>Select your country to continue to checkout.</p>
        </div>

        <form id="buy-form">
          <label class="field-label" for="country">Country</label>
          <select id="country" name="country" class="field-select" required>
            <option value="" disabled selected>Choose a country&hellip;</option>
            <option value="US">United States</option>
            <option value="__other__">Other / International</option>
          </select>

          <button type="submit" class="btn btn-primary buy-submit">Continue to checkout</button>
        </form>

        <p class="note" style="margin-top:18px">
          US purchases are processed by Stripe. All other countries are processed by Lemon Squeezy,
          which handles international sales tax/VAT as merchant of record.
        </p>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      <span>&copy; <span id="yr"></span> Lee Crowe Software</span>
      <span><a href="https://leecrowesoftware.com">leecrowesoftware.com</a></span>
    </div>
  </footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // TODO: replace with the real Stripe Payment Link and Lemon Squeezy checkout URL once
    // the products are created in each dashboard.
    var STRIPE_CHECKOUT_URL = 'https://buy.stripe.com/REPLACE_ME';
    var LEMONSQUEEZY_CHECKOUT_URL = 'https://REPLACE_ME.lemonsqueezy.com/checkout/buy/REPLACE_ME';

    document.getElementById('buy-form').addEventListener('submit', function (event) {
      event.preventDefault();
      var country = document.getElementById('country').value;
      var destination = country === 'US' ? STRIPE_CHECKOUT_URL : LEMONSQUEEZY_CHECKOUT_URL;
      window.location.href = destination;
    });
  </script>
</body>
</html>
